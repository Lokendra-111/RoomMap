<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .main-box{
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        .form-box{
            display: none;
        }

        .active{
            display: block;
        }

        .toggle-btn{
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="main-box">

    <!-- Login Form -->
    <div id="loginForm" class="form-box active">
        <h2 class="text-center mb-4">Login</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" name="login_username" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" name="login_password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>
        </form>

        <p class="text-center mt-3">
            Don't have an account?
            <span class="toggle-btn" onclick="showSignup()">Signup</span>
        </p>
    </div>


    <!-- Signup Form -->
    <div id="signupForm" class="form-box">
        <h2 class="text-center mb-4">Signup</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" class="form-control" name="fullname" required>
            </div>

            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" name="signup_username" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" name="email" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" name="signup_password" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Signup
            </button>
        </form>

        <p class="text-center mt-3">
            Already have an account?
            <span class="toggle-btn" onclick="showLogin()">Login</span>
        </p>
    </div>

</div>

<script>
    function showSignup(){
        document.getElementById("loginForm").classList.remove("active");
        document.getElementById("signupForm").classList.add("active");
    }

    function showLogin(){
        document.getElementById("signupForm").classList.remove("active");
        document.getElementById("loginForm").classList.add("active");
    }
</script>

</body>
</html>
